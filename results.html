<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mixlist Results</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="results.css">
</head>

<body>

    <!-- NAVBAR -->
    <nav class="navbar">
        <div class="logo">Mixlist</div>

        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="#">How it works</a>
            <a href="#">About</a>
        </div>
    </nav>

    <!-- MAIN CONTENT -->
    <main class="results-container">

        <h1>Your Playlist</h1>
        <p class="subtitle">Based on your preferences</p>

        <!-- Playlist Card -->
        <div class="playlist-card">

            <!-- Playlist Info -->
            <div class="playlist-info">
                <img src="https://via.placeholder.com/150" alt="playlist cover">

                <div>
                    <h2>Playlist Name</h2>
                    <p>15 songs • 52 mins</p>
                </div>
            </div>

            <!-- Song List -->
            <ul class="song-list">
                <li>Song Name – Artist</li>
                <li>Song Name – Artist</li>
                <li>Song Name – Artist</li>
                <li>Song Name – Artist</li>
                <li>Song Name – Artist</li>
            </ul>

            <!-- Buttons -->
            <div class="playlist-actions">
                <button class="primary-btn">Save Playlist</button>
                <button class="secondary-btn">Generate New</button>
            </div>

        </div>

    </main>

</body>
</html>
